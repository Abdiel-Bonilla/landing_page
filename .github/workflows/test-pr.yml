name: Test Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # Solo verifica que compila bien sin errores de tipado o sintaxis